version: '3.8'

services:
    tts-fe:
        build:
            context: .
            dockerfile: Dockerfile
        container_name: tts-fe
        ports:
            - '5173:8081'
        restart: unless-stopped
        environment:
            - NODE_ENV=production
        healthcheck:
            test: ['CMD', 'wget', '--no-verbose', '--tries=1', '--spider', 'http://localhost:8081/health']
            interval: 30s
            timeout: 10s
            retries: 3
            start_period: 40s
        networks:
            - tts-network

    # Mock API server (development only)

networks:
    tts-network:
        driver: bridge
