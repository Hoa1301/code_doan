version: '3.8'

services:
  # ─── PostgreSQL Database ────────────────────────────────────────────────────
  db:
    image: postgres:15-alpine
    container_name: tts_learning_db
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-postgres}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-postgres}
      POSTGRES_DB: ${POSTGRES_DB:-tts_learning}
    ports:
      - '${DB_PORT:-5433}:5432'
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ['CMD-SHELL', 'pg_isready -U postgres']
      interval: 10s
      timeout: 5s
      retries: 5

  # ─── Backend NestJS App ─────────────────────────────────────────────────────
  app:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: tts_learning_app
    restart: unless-stopped
    ports:
      - '${PORT:-3001}:3001'
    environment:
      - NODE_ENV=production
      - PORT=${PORT:-3001}
      # Database
      - DB_HOST=db
      - DB_PORT=5432
      - DB_USERNAME=${POSTGRES_USER:-postgres}
      - DB_PASSWORD=${POSTGRES_PASSWORD:-postgres}
      - DB_NAME=${POSTGRES_DB:-tts_learning}
      # Auth
      - JWT_SECRET=${JWT_SECRET:-supersecretkey}
      # Mailer (tuỳ chọn)
      - MAILER_HOST=${MAILER_HOST:-}
      - MAILER_PORT=${MAILER_PORT:-587}
      - MAILER_SECURE=${MAILER_SECURE:-false}
      - MAILER_USER=${MAILER_USER:-}
      - MAILER_PASS=${MAILER_PASS:-}
      # MinIO (tuỳ chọn)
      - MINIO_ENDPOINT=${MINIO_ENDPOINT:-minio}
      - MINIO_PORT=${MINIO_PORT:-9000}
      - MINIO_ACCESS_KEY=${MINIO_ACCESS_KEY:-}
      - MINIO_SECRET_KEY=${MINIO_SECRET_KEY:-}
      - MINIO_BUCKET=${MINIO_BUCKET:-tts-learning}
    depends_on:
      db:
        condition: service_healthy

  # ─── MinIO Object Storage ───────────────────────────────────────────────────
  minio:
    image: minio/minio
    container_name: tts_learning_minio
    restart: unless-stopped
    environment:
      MINIO_ROOT_USER: ${MINIO_ACCESS_KEY:-minioadmin}
      MINIO_ROOT_PASSWORD: ${MINIO_SECRET_KEY:-minioadmin}
    ports:
      - '${MINIO_PORT:-9000}:9000'
      - '${MINIO_CONSOLE_PORT:-9001}:9001'
    volumes:
      - minio_data:/data
    command: server /data --console-address ":9001"

volumes:
  postgres_data:
  minio_data:
